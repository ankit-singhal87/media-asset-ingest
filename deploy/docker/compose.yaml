services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Ingest__InputPath: /mnt/ingest/input
      Ingest__OutputPath: /mnt/ingest/output
    user: "${LOCAL_COMPOSE_UID:-1000}:${LOCAL_COMPOSE_GID:-1000}"
    ports:
      - "${LOCAL_COMPOSE_API_PORT:-5000}:8080"
    volumes:
      - ../../input:/mnt/ingest/input
      - ../../output:/mnt/ingest/output
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: ../..
      dockerfile: deploy/docker/ui.Dockerfile
    ports:
      - "${LOCAL_COMPOSE_UI_PORT:-5173}:80"
    depends_on:
      - api

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: media_ingest
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${LOCAL_COMPOSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_ingest"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
