apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: media-asset-ingest
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: media-asset-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: media-asset-ingest
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: media-ingest-api
        dapr.io/app-port: "8080"
        dapr.io/config: media-ingest-dapr
    spec:
      containers:
        - name: api
          image: ghcr.io/example/media-ingest-api:replace-with-image-tag
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: media-ingest-runtime
          env:
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: media-ingest-postgres
                  key: connection-string
          volumeMounts:
            - name: ingest-input
              mountPath: /mnt/ingest/input
            - name: ingest-output
              mountPath: /mnt/ingest/output
      volumes:
        - name: ingest-input
          emptyDir: {}
        - name: ingest-output
          emptyDir: {}
