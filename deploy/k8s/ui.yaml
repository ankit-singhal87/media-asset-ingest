apiVersion: v1
kind: Service
metadata:
  name: ui
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/part-of: media-asset-ingest
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ui
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/part-of: media-asset-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ui
        app.kubernetes.io/part-of: media-asset-ingest
    spec:
      containers:
        - name: ui
          image: ghcr.io/example/media-ingest-ui:replace-with-image-tag
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
